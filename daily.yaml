name: Daily Tweet Agent

on:
  schedule:
    - cron: "30 7 * * *"   # runs at 1 PM IST (UTC 7:30)
  workflow_dispatch:       # allows manual run

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install groq requests gspread google-auth python-dotenv

      - name: Create creds file
        run: echo '${{ secrets.GOOGLE_CREDS }}' > google_creds.json

      - name: Run script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python daily_tweet_agent.py
